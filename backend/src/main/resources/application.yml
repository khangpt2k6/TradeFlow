spring:
  application:
    name: tradeflow-backend

  # Use H2 in-memory database if DATABASE_URL is not set (for local development)
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:vaultxdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1200000
      leak-detection-threshold: 120000
      auto-commit: false

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
        format_sql: true
        jdbc:
          time_zone: UTC
        connection:
          provider_disables_autocommit: false
    database-platform: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

  lifecycle:
    timeout-per-shutdown-phase: 20s

  h2:
    console:
      enabled: true
      path: /h2-console

  task:
    scheduling:
      pool:
        size: 3
      thread-name-prefix: "TradeFlow-Scheduler-"

server:
  port: 8080
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100
    max-connections: 8192

logging:
  level:
    com.bankmanagement: INFO
    org.hibernate.SQL: WARN
